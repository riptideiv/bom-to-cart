<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOM-to-Cart Settings</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --primary: #e94560;
      --text: #eee;
      --text-secondary: #aaa;
      --success: #2ecc71;
      --error: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 560px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .section h2 { font-size: 14px; margin-bottom: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      margin-bottom: 12px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; }
    .input-row button { flex-shrink: 0; padding: 8px 12px; font-size: 12px; white-space: nowrap; }
    button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--border);
    }
    .status { font-size: 12px; margin-top: 8px; min-height: 18px; }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
    .actions { display: flex; gap: 8px; }
    .hint { font-size: 11px; color: var(--text-secondary); margin-top: -8px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>🛒 BOM-to-Cart</h1>
  <p class="subtitle">Configure AI agent for BOM parsing & shopping assistance</p>

  <form id="config-form">
    <div class="section">
      <h2>OpenRouter API</h2>
      <label for="api-key">API Key</label>
      <div class="input-row">
        <input type="password" id="api-key" placeholder="sk-or-v1-..." autocomplete="off">
        <button type="button" id="toggle-vis" class="secondary" style="padding:8px 10px;">👁</button>
      </div>
      <p class="hint">Get a key at <a href="https://openrouter.ai/keys" target="_blank" style="color:var(--primary)">openrouter.ai/keys</a></p>

      <label for="model">Model</label>
      <select id="model">
        <option value="anthropic/claude-sonnet-4-20250514">Claude Sonnet 4</option>
        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini (cheaper, faster)</option>
        <option value="google/gemini-2.5-pro-preview-05-06">Gemini 2.5 Pro</option>
        <option value="deepseek/deepseek-chat">DeepSeek V3</option>
      </select>
    </div>

    <div class="actions">
      <button type="submit" id="save-btn">Save</button>
      <button type="button" id="test-btn" class="secondary">Test Connection</button>
    </div>
    <div id="status" class="status"></div>
  </form>

  <script src="options.js"></script>
</body>
</html>
